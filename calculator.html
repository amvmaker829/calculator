<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Advanced Scientific Calculator</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;

      /* Gradient + Image combined */
      background: 
        linear-gradient(135deg, rgba(30,60,114,0.7), rgba(42,82,152,0.7)),
        url('https://picsum.photos/1200/800') no-repeat center center fixed;
      background-size: cover;
    }
    .calculator {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0px 8px 20px rgba(0,0,0,0.5);
      width: 320px;
    }
    #display {
      width: 100%;
      height: 50px;
      margin-bottom: 15px;
      text-align: right;
      font-size: 22px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #2c2c2c;
      color: #fff;
    }
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    button {
      height: 55px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #333;
      color: #fff;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover {
      background: #444;
      transform: scale(1.05);
    }
    .equal {
      grid-column: span 2;
      background: #4CAF50;
      color: white;
    }
    .toggle {
      grid-column: span 2;
      background: #2196F3;
      color: white;
    }
    .light-mode {
      background: #f4f4f4;
      color: #000;
    }
    .light-mode #display {
      background: #fff;
      color: #000;
    }
    .light-mode button {
      background: #ddd;
      color: #000;
    }
    .light-mode button:hover {
      background: #ccc;
    }
  </style>
</head>
<body>
  <div class="calculator" id="calc">
    <input type="text" id="display" disabled>
    <div class="buttons">
      <button onclick="clearDisplay()">C</button>
      <button onclick="backspace()">⌫</button>
      <button onclick="appendValue('%')">%</button>
      <button onclick="appendValue('/')">÷</button>
      <button onclick="appendValue('7')">7</button>
      <button onclick="appendValue('8')">8</button>
      <button onclick="appendValue('9')">9</button>
      <button onclick="appendValue('*')">×</button>
      <button onclick="appendValue('4')">4</button>
      <button onclick="appendValue('5')">5</button>
      <button onclick="appendValue('6')">6</button>
      <button onclick="appendValue('-')">−</button>
      <button onclick="appendValue('1')">1</button>
      <button onclick="appendValue('2')">2</button>
      <button onclick="appendValue('3')">3</button>
      <button onclick="appendValue('+')">+</button>
      <button onclick="appendValue('0')">0</button>
      <button onclick="appendValue('.')">.</button>
      <button class="equal" onclick="calculate()">=</button>
      <button class="toggle" onclick="toggleMode()">🌙/☀️</button>

      <!-- Scientific functions -->
      <button onclick="scientific('sqrt')">√</button>
      <button onclick="scientific('pow')">x²</button>
      <button onclick="scientific('sin')">sin</button>
      <button onclick="scientific('cos')">cos</button>
      <button onclick="scientific('tan')">tan</button>
      <button onclick="scientific('log')">log</button>
    </div>
  </div>

  <script>
    let display = document.getElementById('display');
    let calc = document.getElementById('calc');

    function appendValue(value) {
      display.value += value;
    }

    function clearDisplay() {
      display.value = '';
    }

    function backspace() {
      display.value = display.value.slice(0, -1);
    }

    function calculate() {
      try {
        display.value = eval(display.value);
      } catch {
        display.value = 'Error';
      }
    }

    function toggleMode() {
      calc.classList.toggle('light-mode');
    }

    // Scientific functions
    function scientific(func) {
      try {
        let val = parseFloat(display.value);
        if (func === 'sqrt') display.value = Math.sqrt(val);
        if (func === 'pow') display.value = Math.pow(val, 2);
        if (func === 'sin') display.value = Math.sin(val * Math.PI/180); // degree input
        if (func === 'cos') display.value = Math.cos(val * Math.PI/180);
        if (func === 'tan') display.value = Math.tan(val * Math.PI/180);
        if (func === 'log') display.value = Math.log10(val);
      } catch {
        display.value = 'Error';
      }
    }
  </script>
</body>
</html>
